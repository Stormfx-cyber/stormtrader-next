<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StormTrader Next</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
color:#ff0033;
background:#111;
}

.hero{
padding:60px 20px;
}

.hero h1{

}

.hero p{
color:#aaa;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:16px 35px;
background:#ff0033;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.box{
margin:18px;
padding:22px;
background:#111;
border-radius:14px;

}

footer{
padding:40px;

.ai{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:#00ccff;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
box-shadow:0 0 20px #00ccff;
